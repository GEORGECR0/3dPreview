    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>3D Preview Test</title>
    <style>
    body { margin:0; overflow:hidden; background:#111; }
    canvas { display:block; }
    </style>
    </head>
    <body>

    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(10, 8, 10);

    let angle = 0;
    let radius = 16;
    const minRadius = 5;
    const maxRadius = 40;

    window.addEventListener('wheel', e => {
        radius += e.deltaY * 0.01;
        radius = Math.min(Math.max(radius, minRadius), maxRadius);
    });

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffcfa0, 0.5));
    scene.add(new THREE.HemisphereLight(0xffe6b3, 0x442200, 0.9));

    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.castShadow = true;
    sun.position.set(5, 25, -5);
    sun.shadow.mapSize.set(4096, 4096);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 100;
    sun.shadow.camera.left = -20;
    sun.shadow.camera.right = 20;
    sun.shadow.camera.top = 20;
    sun.shadow.camera.bottom = -20;
    sun.shadow.bias = -0.0005;
    scene.add(sun);


    const loader = new THREE.TextureLoader();
    const zipFiles = {};
    const zipUrl = "./Sublight.zip";

    async function loadTexturesFromZip(url) {
        try {
            const res = await fetch(url);
            const buffer = await res.arrayBuffer();
            const zip = await new JSZip().loadAsync(buffer);

            for (const f of Object.keys(zip.files)) {
                if (f.endsWith(".png") || f.endsWith(".jpg")) {
                    const blob = await zip.files[f].async("blob");
                    zipFiles[f.split("/").pop()] = URL.createObjectURL(blob);
                }
            }
        } catch { }

        buildScene();
    }

    function loadPixelTexture(name) {
        let url;
        if (zipFiles[name]) {
            url = zipFiles[name];
        } else {
            url = `assets/${name}`;
        }

        const t = loader.load(url);
        t.magFilter = THREE.NearestFilter;
        t.minFilter = THREE.NearestFilter;
        t.generateMipmaps = false;
        return t;
    }


    function stylize(mat) {
        mat.roughness = 0.9;
        mat.metalness = 0;
        return mat;
    }

    function buildScene() {

        const blockGeo = new THREE.BoxGeometry(0.998,1,0.998);

        const grassMat = stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("grass_top.png") }));
        const dirtMat  = stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("dirt.png") }));
        const stoneMat = stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("stone.png") }));
        const logMat   = stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("log_maple.png") }));

        const chestMaterials = [
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("chest_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("chest_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("chest_top.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("chest_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("chest_front.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("chest_side.png") })),
        ];

            const furnaceMaterials = [
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("furnace_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("furnace_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("furnace_top.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("furnace_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("furnace_front.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("furnace_side.png") })),
        ];

            const workbenchMaterials = [
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("crafting_table_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("crafting_table_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("crafting_table_top.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("crafting_table_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("crafting_table_side.png") })),
            stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("crafting_table_side.png") })),
        ];

        const leafMat  = stylize(new THREE.MeshStandardMaterial({ map: loadPixelTexture("leaves_maple.png") }));

        function createPlatform(w,d,h,ox,oz) {
            for (let y=0;y<h;y++) {
                const mat = (y===h-1)? grassMat : (y===h-2)? dirtMat : stoneMat;
                for (let x=0;x<w;x++) for (let z=0;z<d;z++) {
                    const b = new THREE.Mesh(blockGeo, mat);
                    b.position.set(x-(w-1)/2+ox, y+0.5, z-(d-1)/2+oz);
                    b.castShadow = b.receiveShadow = true;
                    scene.add(b);
                }
            }
        }

        createPlatform(3,3,5,0,-3);
        createPlatform(3,3,5,0,0);
        createPlatform(3,3,5,3,0);

        const chest = new THREE.Mesh(new THREE.BoxGeometry(0.998,1,0.998), chestMaterials);
        chest.position.set(0, 5 + 0.5, -4);
        chest.castShadow = chest.receiveShadow = true;
        scene.add(chest);

        const furnace = new THREE.Mesh(new THREE.BoxGeometry(0.998,1,0.998), furnaceMaterials);
        furnace.position.set(1.0, 5 + 0.5, -4);
        furnace.castShadow = furnace.receiveShadow = true;
        scene.add(furnace);

        const workbench = new THREE.Mesh(new THREE.BoxGeometry(0.998,1,0.998), workbenchMaterials);
        workbench.position.set(-1.0, 5 + 0.5, -4);
        workbench.castShadow = workbench.receiveShadow = true;
        scene.add(workbench);

        const trunkX = 0;
        const trunkY = 5;
        const trunkZ = 0;
        const trunkHeight = 2;
        const trunkTopY = trunkY + trunkHeight;

        function createTrunk(x,y,z,h) {
            for (let i=0;i<h;i++) {
                const b = new THREE.Mesh(blockGeo, logMat);
                b.position.set(x, y+i+0.5, z);
                b.castShadow = b.receiveShadow = true;
                scene.add(b);
            }
        }

        function leaf(x,y,z) {
            const b = new THREE.Mesh(blockGeo, leafMat);
            b.position.set(x, y+0.5, z);
            b.castShadow = b.receiveShadow = true;
            scene.add(b);
        }

        function leafLayerNoCorners(cx, y, cz, size) {
            const r = Math.floor(size/2);
            for (let dx=-r; dx<=r; dx++) for (let dz=-r; dz<=r; dz++) {
                if (Math.abs(dx)===r && Math.abs(dz)===r) continue;
                leaf(cx+dx, y, cz+dz);
            }
        }

        createTrunk(trunkX, trunkY, trunkZ, trunkHeight);

        leafLayerNoCorners(trunkX, trunkTopY,     trunkZ, 5);
        leafLayerNoCorners(trunkX, trunkTopY + 1, trunkZ, 5);

        for (let dx=-1; dx<=1; dx++) for (let dz=-1; dz<=1; dz++)
            leaf(trunkX+dx, trunkTopY+2, trunkZ+dz);

        leaf(trunkX, trunkTopY+3, trunkZ);
        leaf(trunkX+1, trunkTopY+3, trunkZ);
        leaf(trunkX-1, trunkTopY+3, trunkZ);
        leaf(trunkX, trunkTopY+3, trunkZ+1);
        leaf(trunkX, trunkTopY+3, trunkZ-1);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        angle += 0.0035;

        camera.position.set(
            Math.cos(angle) * radius,
            11,
            Math.sin(angle) * radius
        );

        camera.lookAt(1.5, 3, -1);
        renderer.render(scene, camera);
    }


    window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    loadTexturesFromZip(zipUrl);
    </script>

    </body>
    </html>
